<h1>Você está criando um novo contato!</h1>

<form [formGroup]="contatoForm" (ngSubmit)="onSubmit()">
    <label for="nome">Nome:</label>
    <br>
    <input type="text" formControlName="nome" placeholder="Ex: Fulano de Tal">
    <br/>
    <label for="telefone">Telefone:</label>
    <br>
    <input type="text" id="campoTelefone" placeholder="+55 (11) 99999-9999" (input)="aplicarMascaraTelefone($event)" formControlName="telefone">

    <br/><br/>
    <button type="submit" [disabled]="!contatoForm.valid">Cadastrar</button>
</form>

<h3>Visualização do contato:</h3>
<table border="1px">
    <tr>
        <th>Nome</th>
        <th>Telefone</th>
    </tr>
    <tr>
        <th>{{contatoForm.value.nome}}</th>
        <th>{{valor}}</th>
    </tr>
</table>
